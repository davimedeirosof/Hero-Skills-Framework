name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats.json
        run: |
          COMMANDS_REPO=$(find commands -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
          # 21 comandos svelte nao copiados por restricao de nome no Windows (caracter :)
          COMMANDS=$((COMMANDS_REPO + 21))
          AGENTS_REPO=$(find agents -name "*.md" 2>/dev/null | grep -v README | wc -l | tr -d ' ')
          SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
          HOOKS=$(find hooks -name "*.js" 2>/dev/null | wc -l | tr -d ' ')
          NAMESPACES=$(find commands -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')

          # 4 agentes GSD instalados via npx (nao estao no repo)
          # 4 agentes svelte nao copiados por restricao de nome no Windows
          AGENTS_EXTRA=8
          AGENTS_INSTALLED=$((AGENTS_REPO + AGENTS_EXTRA))
          AGENTS_NATIVE=5
          AGENTS_TOTAL=$((AGENTS_INSTALLED + AGENTS_NATIVE))
          UPDATED=$(date +"%Y-%m-%d")

          cat > docs/stats.json << EOF
          {
            "commands": $COMMANDS,
            "agents_installed": $AGENTS_INSTALLED,
            "agents_native": $AGENTS_NATIVE,
            "agents_total": $AGENTS_TOTAL,
            "skills": $SKILLS,
            "hooks": $HOOKS,
            "namespaces": $NAMESPACES,
            "updated": "$UPDATED"
          }
          EOF

          echo "Stats gerados:"
          cat docs/stats.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
